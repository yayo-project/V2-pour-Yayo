<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Yayo</title>
<meta name="description" content="Connectez-vous à Yayo pour contacter les dealers et suivre vos favoris. Gratuit pour les acheteurs.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0A2540">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">

<header class="topbar">
  <div class="wrap topbar-in">
    <a href="index.html" class="logo" aria-label="Yayo"><img src="assets/logo-teal.png" alt="Yayo" class="logo-img"></a>
    <div class="topbar-right">
      <div class="lang"><button class="on">FR</button><button>EN</button><button>AR</button></div>
      <a href="acheter.html" class="btn btn-ghost" data-i18n="au_back">← Voir les voitures</a>
    </div>
  </div>
</header>

<main class="auth-wrap">
  <div class="auth-card">
    <h1 id="auth-title">Bon retour sur Yayo</h1>
    <p class="auth-sub" id="auth-sub">Connectez-vous pour contacter les dealers et retrouver vos favoris.</p>

    <button class="btn-google" onclick="doGoogle()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.2-.1-2.4-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41 35.4 44 30.2 44 24c0-1.2-.1-2.4-.4-3.5z"/></svg>
      <span data-i18n="au_google">Continuer avec Google</span>
    </button>

    <div class="auth-or"><span data-i18n="au_or">ou par email</span></div>

    <form onsubmit="return doEmail(event)">
      <div class="field">
        <label for="a-email" data-i18n="au_email">Email</label>
        <input id="a-email" type="email" autocomplete="email" required data-i18n-ph="au_email_ph" placeholder="vous@exemple.com">
      </div>
      <div class="field">
        <label for="a-pass" data-i18n="au_pass">Mot de passe</label>
        <input id="a-pass" type="password" autocomplete="current-password" required minlength="6" data-i18n-ph="au_pass_ph" placeholder="6 caractères minimum">
      </div>
      <div class="auth-error" id="auth-error" hidden></div>
      <button type="submit" class="btn btn-solid btn-block" id="auth-btn">Se connecter</button>
      <p class="auth-switch" id="forgot-row" style="margin-top:10px"><a href="#" id="forgot-link" onclick="return doForgot(event)" data-i18n="au_forgot">Mot de passe oublié ?</a></p>
    </form>

    <p class="auth-switch" id="auth-switch">
      Pas encore de compte ? <a href="#" onclick="return switchMode(event)">Créer un compte gratuit</a>
    </p>
    <p class="auth-note" data-i18n-html="au_note">Acheteur ? C'est 100% gratuit, aucune carte demandée.<br>Dealer ou agence ? <a href="vendre.html">Inscrivez-vous ici →</a></p>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/analytics.js"></script>
<script src="js/i18n.js"></script>
<script src="js/auth.js"></script>
<script>
let signupMode = false;
let confirmShown = false;
const nextUrl = new URLSearchParams(location.search).get("next") || "index.html";

// Mode-dependent strings live here (not data-i18n) so signup/signin state survives language switches
function updateModeText() {
  if (confirmShown) return;
  document.getElementById("auth-title").textContent = signupMode ? t("au_title_up") : t("au_title_in");
  document.getElementById("auth-sub").textContent = signupMode ? t("au_sub_up") : t("au_sub_in");
  document.getElementById("auth-btn").textContent = signupMode ? t("au_btn_up") : t("au_btn_in");
  document.getElementById("auth-switch").innerHTML = signupMode ? t("au_sw_up") : t("au_sw_in");
}
window.onLangChange = updateModeText;

function switchMode(e) {
  e.preventDefault();
  signupMode = !signupMode;
  document.getElementById("forgot-row").hidden = signupMode;
  updateModeText();
  showError("");
  return false;
}

// "Mot de passe oublié" — sends the Supabase reset email (returns to THIS site)
async function doForgot(e) {
  e.preventDefault();
  showError("");
  const email = document.getElementById("a-email").value.trim();
  if (!email) return showError(t("au_forgot_email")), false;
  const error = await yayoResetPassword(email);
  if (error) return showError(friendly(error)), false;
  confirmShown = true;
  document.getElementById("auth-title").textContent = t("au_reset_sent_t");
  document.getElementById("auth-sub").textContent = t("au_reset_sent_p").replace("{email}", email);
  return false;
}

// When the user comes back from the reset-password email, Supabase fires
// PASSWORD_RECOVERY — switch the form into "choose a new password" mode.
let recoveryMode = false;
yayoSB().auth.onAuthStateChange((event) => {
  if (event !== "PASSWORD_RECOVERY" || recoveryMode) return;
  recoveryMode = true;
  confirmShown = true;
  document.getElementById("auth-title").textContent = t("au_reset_t");
  document.getElementById("auth-sub").textContent = t("au_reset_p");
  document.getElementById("auth-btn").textContent = t("au_reset_btn");
  document.getElementById("a-email").closest(".field").hidden = true;
  document.getElementById("a-email").required = false;
  document.getElementById("a-pass").value = "";
  document.getElementById("a-pass").autocomplete = "new-password";
  document.getElementById("forgot-row").hidden = true;
  document.getElementById("auth-switch").hidden = true;
});

function showError(msg) {
  const el = document.getElementById("auth-error");
  el.hidden = !msg;
  el.textContent = msg || "";
}

function friendly(error) {
  const m = (error && error.message) || "";
  if (m.includes("Invalid login credentials")) return t("au_err_creds");
  if (m.includes("already registered")) return t("au_err_exists");
  if (m.includes("Email not confirmed")) return t("au_err_confirm");
  if (m.includes("rate limit")) return t("au_err_rate");
  return t("au_err_generic") + m;
}

async function doGoogle() {
  showError("");
  const error = await yayoSignInGoogle(nextUrl);
  if (error) showError(friendly(error));
}

async function doEmail(e) {
  e.preventDefault();
  showError("");
  const email = document.getElementById("a-email").value.trim();
  const pass = document.getElementById("a-pass").value;
  const btn = document.getElementById("auth-btn");
  btn.disabled = true;
  if (recoveryMode) {
    const { error } = await yayoSB().auth.updateUser({ password: pass });
    btn.disabled = false;
    if (error) return showError(friendly(error)), false;
    alert(t("au_reset_done"));
    location.href = nextUrl;
    return false;
  }
  if (signupMode) {
    const { data, error } = await yayoSignUpEmail(email, pass, { role: "buyer" });
    btn.disabled = false;
    if (error) return showError(friendly(error)), false;
    if (typeof yayoTrack === "function") yayoTrack("sign_up", { method: "email" });
    if (data && data.session) { location.href = nextUrl; return false; }
    confirmShown = true;
    document.getElementById("auth-title").textContent = t("au_confirm_t");
    document.getElementById("auth-sub").textContent = t("au_confirm_p").replace("{email}", email);
    return false;
  }
  const error = await yayoSignInEmail(email, pass);
  btn.disabled = false;
  if (error) return showError(friendly(error)), false;
  location.href = nextUrl;
  return false;
}

updateModeText();
</script>
</body>
</html>
